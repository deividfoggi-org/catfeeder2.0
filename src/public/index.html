<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Feeder Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
    <style>
        :root {
            --vscode-bg: #ffffff;
            --vscode-fg: #1e1e1e;
            --vscode-border: #e0e0e0;
            --vscode-blue: #007acc;
            --vscode-highlight: #e8e8e8;
            --vscode-button-bg: #007acc;
            --vscode-button-fg: #ffffff;
            --vscode-button-hover: #0062a3;
            --vscode-shadow: rgba(0, 0, 0, 0.1);
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            color: var(--vscode-fg);
            background-color: var(--vscode-bg);
            line-height: 1.5;
        }
        
        header, main {
            text-align: center;
            width: 90%;
            max-width: 800px;
        }
        
        h1, h2 {
            color: var(--vscode-blue);
            margin-bottom: 1rem;
        }
        
        section {
            background-color: var(--vscode-bg);
            border: 1px solid var(--vscode-border);
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px var(--vscode-shadow);
        }
        
        form {
            display: inline-block;
            text-align: left;
            width: 100%;
        }
        
        form div {
            margin-bottom: 15px;
        }
        
        label {
            display: inline-block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        input[type="checkbox"] {
            margin-right: 5px;
            vertical-align: middle;
        }
        
        select {
            padding: 6px 10px;
            border: 1px solid var(--vscode-border);
            border-radius: 3px;
            background-color: var(--vscode-bg);
            margin-right: 10px;
        }
        
        button {
            background-color: var(--vscode-button-bg);
            color: var(--vscode-button-fg);
            border: none;
            border-radius: 3px;
            padding: 8px 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: 500;
        }
        
        button:hover {
            background-color: var(--vscode-button-hover);
        }
        
        #schedule-status, #gpio-status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 3px;
            background-color: var(--vscode-highlight);
        }
        
        table {
            margin-top: 20px;
            border-collapse: collapse;
            width: 100%;
            background-color: var(--vscode-bg);
        }
        
        table, th, td {
            border: 1px solid var(--vscode-border);
        }
        
        th, td {
            padding: 10px;
            text-align: left;
        }
        
        th {
            background-color: var(--vscode-highlight);
            font-weight: 500;
        }
        
        tr:hover {
            background-color: var(--vscode-highlight);
        }
        
        footer {
            margin-top: auto;
            padding: 10px 0;
            width: 100%;
            text-align: center;
            border-top: 1px solid var(--vscode-border);
        }
        
        #clock {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--vscode-blue);
            margin: 10px 0;
            background-color: var(--vscode-highlight);
            padding: 5px 10px;
            border-radius: 3px;
            display: inline-block;
        }
        
        .days-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .day-label {
            display: flex;
            align-items: center;
            margin-right: 8px;
        }
        
        #delete-schedules {
            margin-top: 10px;
            background-color: #d32f2f;
        }
        
        #delete-schedules:hover {
            background-color: #b71c1c;
        }

        /* Toggle switch styles */
        .toggle-switch {
            position: relative;
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 18px;
            background-color: #ccc;
            border-radius: 18px;
            transition: .4s;
            margin-right: 8px;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            border-radius: 50%;
            transition: .4s;
        }
        
        input:checked + .toggle-slider {
            background-color: var(--vscode-blue);
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(18px);
        }
        
        .toggle-label {
            font-size: 14px;
        }

        /* Feed logs styles */
        #feed-logs {
            background-color: var(--vscode-bg);
            border: 1px solid var(--vscode-border);
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px var(--vscode-shadow);
        }

        #feed-logs-content,
        #feed-logs-empty,
        #feed-logs-error {
            display: none;
        }

        .feed-log-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            margin-bottom: 8px;
            border: 1px solid var(--vscode-border);
            border-radius: 3px;
            background-color: var(--vscode-highlight);
        }

        .feed-log-entry:last-child {
            margin-bottom: 0;
        }

        .feed-log-entry.success {
            border-left: 4px solid #4caf50;
        }

        .feed-log-entry.failure {
            border-left: 4px solid #f44336;
        }

        .feed-log-time {
            font-weight: 500;
            color: var(--vscode-blue);
        }

        .feed-log-details {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .feed-log-portions {
            background-color: var(--vscode-button-bg);
            color: var(--vscode-button-fg);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .feed-log-status {
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .feed-log-status.success {
            color: #4caf50;
        }

        .feed-log-status.failure {
            color: #f44336;
        }
    </style>
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 0 20px; box-sizing: border-box;">
        <!-- Title and Clock Section -->
        <div style="flex: 0 0 50%; display: flex; flex-direction: column; justify-content: center;">
            <h1 style="margin: 0;">Cat Feeder Management</h1>
            <div id="clock" style="margin-top: 5px;"></div>

        <!-- Authentication Section -->

        <div id="userInfo" style="display: none; text-align: right;">

    <!-- Main content (hidden by default) -->

    <script>
        const dayMapping = {
            0: 'Sunday',
            1: 'Monday',
            2: 'Tuesday',
            3: 'Wednesday',
            4: 'Thursday',
            5: 'Friday',
            6: 'Saturday'
        };

        document.getElementById('add-schedule').addEventListener('click', function() {
            const days = Array.from(document.querySelectorAll('input[name="days"]:checked')).map(el => el.value);
            const hours = document.getElementById('hours-list').value;
            const minutes = document.getElementById('minutes-list').value;
            const portions = document.getElementById('portions-list').value;

            // Validate input
            if (days.length === 0) {
                document.getElementById('schedule-status').innerText = 'Please select at least one day';
                return;
            }

            if (isNaN(hours) || hours < 0 || hours > 23) {
                document.getElementById('schedule-status').innerText = 'Invalid hour selected';
                return;
            }

            if (isNaN(minutes) || minutes < 0 || minutes > 59) {
                document.getElementById('schedule-status').innerText = 'Invalid minute selected';
                return;
            }

            if (isNaN(portions) || portions <= 0) {
                document.getElementById('schedule-status').innerText = 'Invalid portions selected';
                return;
            }

            // Construct the request payload
            const payload = {
                days,
                hours,
                minutes,
                portions
            };

            // Send the request to the backend
            (async () => {
                let token = '';
                const account = msalInstance.getActiveAccount();
                if (account) {
                    try {
                        const tokenResponse = await msalInstance.acquireTokenSilent({
                            scopes: ["openid", "profile", "User.Read"],
                            account: account,
                            forceRefresh: false
                        });
                        if (tokenResponse && tokenResponse.accessToken) {
                            token = tokenResponse.accessToken;
                        }
                    } catch (error) {
                        console.error("Token acquisition for schedules failed:", error);
                    }
                }
                fetch('/api/schedules', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(token ? { 'Authorization': `Bearer ${token}` } : {})
                    },
                    body: JSON.stringify(payload)
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to add schedule');
                    }
                    return response.json();
                })
                .then(data => {
                    document.getElementById('schedule-status').innerText = `Schedule added successfully`;
                    loadSchedules();
                })
                .catch(error => {
                    console.error('Error adding schedule:', error);
                    document.getElementById('schedule-status').innerText = 'Error adding schedule';
                });
            })();
        });

        async function loadSchedules() {
            let token = '';
            const account = msalInstance.getActiveAccount();
            if (account) {
                try {
                    const tokenResponse = await msalInstance.acquireTokenSilent({
                        scopes: ["openid", "profile", "User.Read"],
                        account: account,
                        forceRefresh: false
                    });
                    if (tokenResponse && tokenResponse.accessToken) {
                        token = tokenResponse.accessToken;
                    }
                } catch (error) {
                    console.error("Token acquisition for schedules failed:", error);
                }
            }
            try {
                const response = await fetch('/api/schedules', {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                if (!response.ok) {
                    throw new Error('Failed to fetch schedules');
                }
                const data = await response.json();
                const tbody = document.getElementById('schedules-table').querySelector('tbody');
                tbody.innerHTML = '';
                if (Array.isArray(data)) {
                    data.forEach(schedule => {
                        const row = document.createElement('tr');
                        const selectCell = document.createElement('td');
                        const checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.value = schedule.id; // Assuming each schedule has a unique ID
                        selectCell.appendChild(checkbox);
                        const daysCell = document.createElement('td');
                        daysCell.innerText = schedule.days.map(day => dayMapping[day]).join(', ');
                        const timeCell = document.createElement('td');
                        // Convert 24-hour format to 12-hour format with AM/PM
                        let hours = parseInt(schedule.hours);
                        const minutes = parseInt(schedule.minutes || 0);
                        const ampm = hours >= 12 ? 'PM' : 'AM';
                        hours = hours % 12;
                        hours = hours ? hours : 12; // the hour '0' should be '12'
                        const formattedMinutes = minutes.toString().padStart(2, '0');
                        const formattedTime = `${hours}:${formattedMinutes} ${ampm}`;
                        timeCell.innerText = formattedTime;
                        const portionsCell = document.createElement('td');
                        portionsCell.innerText = `${schedule.portions} Portion${schedule.portions > 1 ? 's' : ''}`;
                        row.appendChild(selectCell);
                        row.appendChild(daysCell);
                        row.appendChild(timeCell);
                        row.appendChild(portionsCell);
                        tbody.appendChild(row);
                    });
                } else {
                    console.error('Error fetching schedules: Response is not an array', data);
                }
            } catch (error) {
                console.error('Error fetching schedules:', error);
            }
        }

        document.getElementById('delete-schedules').addEventListener('click', function() {
            const selectedSchedules = Array.from(document.querySelectorAll('#schedules-table input[type="checkbox"]:checked')).map(el => el.value);

            if (selectedSchedules.length === 0) {
                document.getElementById('schedule-status').innerText = 'Please select at least one schedule to delete';
                return;
            }

            document.getElementById('schedule-status').innerText = 'Deleting selected schedules...';

            // Send a POST request to delete multiple schedules
            (async () => {
                let token = '';
                const account = msalInstance.getActiveAccount();
                if (account) {
                    try {
                        const tokenResponse = await msalInstance.acquireTokenSilent({
                            scopes: ["openid", "profile", "User.Read"],
                            account: account,
                            forceRefresh: false
                        });
                        if (tokenResponse && tokenResponse.accessToken) {
                            token = tokenResponse.accessToken;
                        }
                    } catch (error) {
                        console.error("Token acquisition for schedules failed:", error);
                    }
                }
                fetch('/api/schedules/delete-multiple', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(token ? { 'Authorization': `Bearer ${token}` } : {})
                    },
                    body: JSON.stringify({ ids: selectedSchedules })
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to delete schedules');
                    }
                    return response.json();
                })
                .then(data => {
                    document.getElementById('schedule-status').innerText = 'Selected schedules deleted successfully';
                    loadSchedules(); // Reload the schedules after deletion
                })
                .catch(error => {
                    console.error('Error deleting schedules:', error);
                    document.getElementById('schedule-status').innerText = 'Error deleting schedules';
                });
            })();
        });

        // GPIO Test Button - Toggle GPIO pin 17
        document.getElementById('test-gpio').addEventListener('click', function() {
            // Show loading state
            const statusElement = document.getElementById('gpio-status');
            statusElement.innerText = 'Dispensing 1 portion...';

            (async () => {
                let token = '';
                const account = msalInstance.getActiveAccount();
                if (account) {
                    try {
                        const tokenResponse = await msalInstance.acquireTokenSilent({
                            scopes: ["openid", "profile", "User.Read"],
                            account: account,
                            forceRefresh: false
                        });
                        if (tokenResponse && tokenResponse.accessToken) {
                            token = tokenResponse.accessToken;
                        }
                    } catch (error) {
                        console.error("Token acquisition for feed failed:", error);
                    }
                }
                fetch('/api/feed', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(token ? { 'Authorization': `Bearer ${token}` } : {})
                    },
                    body: JSON.stringify({ portions: 1 })
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    statusElement.innerText = data.message || 'Dispensed 1 portion successfully';
                    // Refresh feed logs after successful feed
                    loadFeedLogs();
                })
                .catch(error => {
                    console.error('Error dispensing portion:', error);
                    statusElement.innerText = 'Error dispensing portion';
                    // Also refresh logs to show any failed attempts
                    loadFeedLogs();
                });
            })();
        });

        // Clock functionality
        function updateClock() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }
        
        // Update clock immediately and then every second
        updateClock();
        setInterval(updateClock, 1000);

        // Outlook Authentication
        const msalConfig = {
            auth: {
                clientId: "20011978-4169-44c6-afc4-d210dd3b00f7",
                authority: "https://login.microsoftonline.com/consumers",
                redirectUri: window.location.origin,  
                postLogoutRedirectUri: window.location.origin,
                navigateToLoginRequestUrl: true
            },
            cache: {
                cacheLocation: "localStorage", 
                storeAuthStateInCookie: true
            },
            system: {
                windowHashTimeout: 90000, // Increased timeout for handling redirects
                iframeHashTimeout: 10000, // Increased timeout for iframes
                navigateFrameWait: 500,   // Time to wait for navigate frames
                logLevel: msal.LogLevel.Verbose // Set to Verbose for detailed logging during troubleshooting
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        function signIn() {
            // Azure Best Practice: Provide visual feedback during authentication
            document.getElementById("loginButton").textContent = "Signing in...";
            document.getElementById("loginButton").disabled = true;
            
            // Azure Best Practice: Use device-appropriate authentication flows
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            // Azure Best Practice: Request minimal required scopes (principle of least privilege)
            const loginRequest = {
                scopes: ["openid", "profile", "User.Read"],
                prompt: "select_account"
            };
            
            try {
                // For more reliable authentication, consistently use redirect for all platforms
                console.log("Using redirect flow for authentication");
                msalInstance.loginRedirect(loginRequest)
                    .catch(error => {
                        console.error("Sign-in redirect error:", error);
                        resetSignInButton();
                    });
            } catch (error) {
                console.error("Unexpected error during sign in:", error);
                resetSignInButton();
            }
        }

        function resetSignInButton() {
            document.getElementById("loginButton").textContent = "Sign in with Outlook";
            document.getElementById("loginButton").disabled = false;
        }

        function handleAuthResponse(response) {
            if (response && response.account) {
                // Set the active account in MSAL
                msalInstance.setActiveAccount(response.account);
                
                // Update the UI with the authenticated user
                updateUI(response.account);
            } else {
                console.error("Auth response did not contain an account");
                updateUI(null);
            }
        }

        function updateUI(account) {
            if (account) {
                // User is signed in
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('userInfo').style.display = 'block';
                document.getElementById('userName').textContent = account.name || account.username || 'Signed In User';
                document.getElementById('main-content').style.display = 'block';
                
                // Setup auth toggle when user is signed in
                setupAuthToggle();
                // Always load feed logs when signed in
                loadFeedLogs();
            } else {
                // User is signed out - check if auth is required
                fetch('/auth-status')
                    .then(response => response.json())
                    .then(data => {
                        const authRequired = data.authRequired !== false;
                        if (authRequired) {
                            document.getElementById('auth-section').style.display = 'block';
                            document.getElementById('userInfo').style.display = 'none';
                            document.getElementById('main-content').style.display = 'none';
                            resetSignInButton();
                        } else {
                            document.getElementById('auth-section').style.display = 'none';
                            document.getElementById('userInfo').style.display = 'none';
                            document.getElementById('main-content').style.display = 'block';
                            showAuthDisabledBanner();
                            // REMOVE floating auth toggle for public
                            // showAuthToggleForPublic();
                            // Always load feed logs for public
                            loadFeedLogs();
                        }
                    })
                    .catch(error => {
                        console.error("Error checking auth status:", error);
                        document.getElementById('auth-section').style.display = 'block';
                        document.getElementById('userInfo').style.display = 'none';
                        document.getElementById('main-content').style.display = 'none';
                        resetSignInButton();
                    });
            }
        }

        async function checkAuthStatus() {
            try {
                const response = await fetch('/auth-status');
                const data = await response.json();
                return data.authRequired;
            } catch (error) {
                console.error('Error checking auth status:', error);
                return true; // Default to requiring auth if there's an error
            }
        }

        async function updateAuthStatus(authRequired) {
            try {
                let token = '';
                const account = msalInstance.getActiveAccount();
                
                if (account) {
                    try {
                        // Azure Best Practice: Use appropriate scopes for your API
                        const tokenResponse = await msalInstance.acquireTokenSilent({
                            scopes: ["openid", "profile", "User.Read"],
                            account: account,
                            forceRefresh: false
                        });
                        
                        if (tokenResponse && tokenResponse.accessToken) {
                            token = tokenResponse.accessToken;
                            console.log("Token acquired silently");
                        } else {
                            console.warn("Silent token acquisition returned empty token");
                        }
                    } catch (error) {
                        console.error("Token acquisition failed silently, falling back to redirect:", error);
                        
                        // Using redirect for consistency instead of popup
                        try {
                            // Initiate redirect flow for token acquisition
                            await msalInstance.acquireTokenRedirect({
                                scopes: ["openid", "profile", "User.Read"],
                                redirectUri: window.location.origin
                            });
                            // Note: We won't reach this point immediately as the page will redirect
                            return false;
                        } catch (redirectError) {
                            console.error("Interactive token acquisition failed:", redirectError);
                        }
                    }
                }
                
                // Only allow auth disabling by authenticated users
                if (!token && authRequired === false) {
                    alert("You must be authenticated to disable authentication");
                    return false;
                }
                
                const response = await fetch('/auth-status', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': token ? `Bearer ${token}` : ''
                    },
                    body: JSON.stringify({ authRequired })
                });
                
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error || 'Failed to update authentication status');
                }
                
                if (!authRequired) {
                    showAuthDisabledBanner();
                } else {
                    removeAuthDisabledBanner();
                }
                
                return true;
            } catch (error) {
                console.error('Error updating auth status:', error);
                alert(`Failed to update authentication settings: ${error.message}`);
                return false;
            }
        }

        function setupAuthToggle() {
            initAuthToggle();
        }

        // Feed logs functionality
        async function loadFeedLogs() {
            const loadingDiv = document.getElementById('feed-logs-loading');
            const contentDiv = document.getElementById('feed-logs-content');
            const errorDiv = document.getElementById('feed-logs-error');
            const emptyDiv = document.getElementById('feed-logs-empty');
            const listDiv = document.getElementById('feed-logs-list');

            // Show loading state
            loadingDiv.style.display = 'block';
            contentDiv.style.display = 'none';
            errorDiv.style.display = 'none';

            try {
                let token = '';
                const account = msalInstance.getActiveAccount();
                if (account) {
                    try {
                        const tokenResponse = await msalInstance.acquireTokenSilent({
                            scopes: ["openid", "profile", "User.Read"],
                            account: account,
                            forceRefresh: false
                        });
                        if (tokenResponse && tokenResponse.accessToken) {
                            token = tokenResponse.accessToken;
                        }
                    } catch (error) {
                        console.error("Token acquisition for feed logs failed:", error);
                    }
                }

                const response = await fetch('/feed-logs?limit=5', {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                // Hide loading
                loadingDiv.style.display = 'none';
                contentDiv.style.display = 'block';

                if (data.logs && data.logs.length > 0) {
                    emptyDiv.style.display = 'none';
                    listDiv.innerHTML = '';

                    data.logs.forEach(log => {
                        const logEntry = document.createElement('div');
                        logEntry.className = `feed-log-entry ${log.success ? 'success' : 'failure'}`;
                        const timestamp = new Date(log.timestamp);
                        const timeString = timestamp.toLocaleString('en-US', {
                            month: 'short',
                            day: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit',
                            hour12: true
                        });
                        logEntry.innerHTML = `
                            <div class="feed-log-time">${timeString}</div>
                            <div class="feed-log-details">
                                <span class="feed-log-portions">${log.portions} portion${log.portions > 1 ? 's' : ''}</span>
                                <span class="feed-log-status ${log.success ? 'success' : 'failure'}">
                                    ${log.success ? 'Success' : 'Failed'}
                                </span>
                            </div>
                        `;
                        listDiv.appendChild(logEntry);
                    });
                } else {
                    emptyDiv.style.display = 'block';
                    listDiv.innerHTML = '';
                }
            } catch (error) {
                console.error('Error loading feed logs:', error);
                loadingDiv.style.display = 'none';
                contentDiv.style.display = 'none';
                errorDiv.style.display = 'block';
            }
        }

        async function initAuthToggle() {
            const toggle = document.getElementById('authToggle');
            if (!toggle) return;
            
            // Set initial state
            const isAuthRequired = await checkAuthStatus();
            toggle.checked = isAuthRequired;
            updateAuthToggleLabel(isAuthRequired);
            
            // Add event listener
            toggle.addEventListener('change', async function() {
                const newAuthRequired = this.checked;
                const updated = await updateAuthStatus(newAuthRequired);
                
                if (!updated) {
                    // Revert the toggle if update failed
                    this.checked = !newAuthRequired;
                    updateAuthToggleLabel(!newAuthRequired);
                } else {
                    updateAuthToggleLabel(newAuthRequired);
                }
            });
        }

        function updateAuthToggleLabel(authRequired) {
            const label = document.getElementById('authToggleLabel');
            if (label) {
                label.textContent = authRequired ? 'Authentication Required' : 'Authentication Disabled';
            }
        }

        function showAuthDisabledBanner() {
            // Remove existing banner if any
            removeAuthDisabledBanner();
            
            // Create a banner
            const banner = document.createElement('div');
            banner.id = 'auth-disabled-banner';
            banner.style.backgroundColor = '#FFC107';
            banner.style.color = '#000';
            banner.style.padding = '5px 10px';
            banner.style.borderRadius = '4px';
            banner.style.fontSize = '12px';
            banner.style.marginTop = '5px';
            banner.style.textAlign = 'center';
            banner.style.width = '100%';
            banner.textContent = 'Authentication Disabled - Anyone can access this page';
            
            // Insert at the top of the body
            document.body.insertBefore(banner, document.body.firstChild);
        }

        function removeAuthDisabledBanner() {
            const existingBanner = document.getElementById('auth-disabled-banner');
            if (existingBanner) {
                existingBanner.remove();
            }
        }

        function checkAuthRequirement() {
            fetch('/auth-status')
                .then(response => response.json())
                .then(data => {
                    const authRequired = data.authRequired !== false;
                    
                    if (!authRequired) {
                        // If auth is not required, show the main content without login
                        document.getElementById('auth-section').style.display = 'none';
                        document.getElementById('main-content').style.display = 'block';
                        showAuthDisabledBanner();
                    }
                })
                .catch(error => {
                    console.error("Error checking auth requirement:", error);
                });
        }

        // REMOVED floating public auth toggle

        function initializeAuth() {
            // Azure Best Practice: Add robust event handling for auth flows
            msalInstance.addEventCallback((event) => {
                // Log MSAL events for monitoring and debugging
                if (event.eventType === msal.EventType.LOGIN_SUCCESS) {
                    console.log("Login successful via", event.interactionType);
                    handleAuthResponse(event.payload);
                } else if (event.eventType === msal.EventType.LOGIN_FAILURE) {
                    console.error("Login failed:", error);
                    resetSignInButton();
                } else if (event.eventType === msal.EventType.ACQUIRE_TOKEN_SUCCESS) {
                    console.log("Token acquired successfully");
                } else if (event.eventType === msal.EventType.ACQUIRE_TOKEN_FAILURE) {
                    console.error("Token acquisition failed:", error);
                } else if (event.eventType === msal.EventType.HANDLE_REDIRECT_START) {
                    console.log("Starting redirect handling");
                } else if (event.eventType === msal.EventType.HANDLE_REDIRECT_END) {
                    console.log("Completed redirect handling");
                }
            });
            
            // Azure Best Practice: Handle redirect promises properly with better error handling
            console.log("Initializing MSAL and checking for redirect response");
            msalInstance.handleRedirectPromise()
                .then(response => {
                    console.log("Handling redirect response", response ? "with auth result" : "without auth result");
                    if (response) {
                        // Redirect response contains tokens/account
                        console.log("Received authentication result from redirect");
                        handleAuthResponse(response);
                    } else {
                        console.log("No redirect response, checking for existing accounts");
                        // Check if we have an active account from a previous sign-in
                        const accounts = msalInstance.getAllAccounts();
                        if (accounts.length > 0) {
                            // Azure Best Practice: Set the first account as active
                            console.log("Found existing account, setting as active:", accounts[0].username);
                            msalInstance.setActiveAccount(accounts[0]);
                            updateUI(accounts[0]);
                        } else {
                            console.log("No existing accounts found");
                            updateUI(null);
                        }
                    }
                })
                .catch(error => {
                    console.error("Error handling redirect:", error);
                    updateUI(null);
                });
        }

        function signOut() {
            // Azure Best Practice: Use the proper account-aware sign-out method
            const account = msalInstance.getActiveAccount();
            
            // Check if we have an active account before trying to sign out
            if (account) {
                // Azure Best Practice: Clear local state before redirecting
                const logoutRequest = {
                    account: account,
                    postLogoutRedirectUri: window.location.origin
                };
                
                // Use logout method and handle promise properly
                msalInstance.logoutRedirect(logoutRequest)
                    .catch(error => {
                        console.error("Logout error:", error);
                    });
            } else {
                // If no active account, just update UI
                updateUI(null);
            }
        }

        function debugMsalState() {
            console.log("--- MSAL Debug Info ---");
            console.log("Active account:", msalInstance.getActiveAccount());
            console.log("All accounts:", msalInstance.getAllAccounts());
            
            const storageKeys = Object.keys(localStorage).filter(key => key.includes('msal'));
            console.log("MSAL localStorage keys:", storageKeys);
            
            storageKeys.forEach(key => {
                try {
                    const value = localStorage.getItem(key);
                    console.log(`${key}: ${value ? value.substring(0, 50) + "..." : "null"}`);
                } catch (e) {
                    console.error(`Error reading ${key}:`, e);
                }
            });
            
            console.log("Browser details:", navigator.userAgent);
            console.log("Current URL:", window.location.href);
            console.log("--- End MSAL Debug Info ---");
        }

        window.addEventListener('load', () => {
            console.log("Page loaded - initializing auth");
            initializeAuth();
            
            // Debug MSAL state (remove in production)
            setTimeout(debugMsalState, 2000);
            
            // Other initialization code
            checkAuthStatus();
            loadSchedules();
        });

        const logoutButton = document.getElementById("logoutButton");
        if (logoutButton) {
            logoutButton.addEventListener("click", signOut);
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (document.getElementById('authToggle')) {
                initAuthToggle();
            }
            // Load feed logs when the page loads
            loadFeedLogs();
        });

        const loginButton = document.getElementById('loginButton');
        if (loginButton) {
            loginButton.addEventListener('click', signIn);
        }

        // Ensure login button is connected
        document.addEventListener('DOMContentLoaded', function() {
            const loginButton = document.getElementById('loginButton');
            if (loginButton) {
                // Remove any existing listeners to prevent duplicates
                loginButton.replaceWith(loginButton.cloneNode(true));
                // Get the fresh reference and add the event listener
                document.getElementById('loginButton').addEventListener('click', signIn);
            }
            
            const logoutButton = document.getElementById('logoutButton');
            if (logoutButton) {
                // Remove any existing listeners to prevent duplicates
                logoutButton.replaceWith(logoutButton.cloneNode(true));
                // Get the fresh reference and add the event listener
                document.getElementById('logoutButton').addEventListener('click', signOut);
            }
        });
    </script>
</body>
</html>
